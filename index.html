<body class="min-h-screen flex items-center justify-center font-body-md text-on-surface p-4">
<!-- Top Navigation -->
<a class="api-docs-link" href="https://github.com/Alaliman/card-validation-api" target="_blank" rel="noopener noreferrer">
view API Docs
<span class="icon">
<svg class="w-4 h-4" xmlns="http://www.w3.org/2000/svg" fill="none" viewBox="0 0 24 24" stroke="currentColor">
<path stroke-linecap="round" stroke-linejoin="round" stroke-width="2" d="M13.828 10.172a4 4 0 00-5.656 0l-4 4a4 4 0 105.656 5.656l1.102-1.101m-.758-4.899a4 4 0 005.658 0l4-4a4 4 0 00-5.656-5.656l-1.1 1.1" />
</svg>
</span>
</a>
<!-- Card Container -->
<main class="w-full max-w-md bg-surface border border-outline-variant rounded-xl p-lg flex flex-col gap-xl">
<!-- Header -->
<header class="flex flex-col gap-sm text-center">
<h1 class="font-h2 text-h2 text-primary">Card Validator</h1>
<p class="font-body-sm text-body-sm text-on-surface-variant">Enter your card number to check if it's valid</p>
</header>
<!-- Form Section -->
<section class="flex flex-col gap-lg">
<!-- Input Group -->
<div class="flex flex-col gap-sm">
<label class="font-label-caps text-label-caps text-on-surface" for="cardNumber">Card Number</label>
<div class="relative">
<input class="w-full bg-[#161616] border border-[#27272a] rounded text-primary font-mono-data text-mono-data px-4 py-3 focus:outline-none focus:border-white transition-colors placeholder:text-outline-variant" id="cardNumber" placeholder="1234 5678 9012 3456" type="text"/>
<div class="absolute inset-y-0 right-0 flex items-center pr-3 pointer-events-none">
<span class="material-symbols-outlined text-on-surface-variant" data-icon="credit_card">credit_card</span>
</div>
</div>
<!-- Inline Error State -->
<p class="font-body-sm text-body-sm text-error hidden" id="errorMessage">Please enter a valid numeric card number</p>
</div>
<!-- Action Button -->
<button class="w-full bg-primary text-on-primary-fixed font-label-caps text-label-caps py-4 rounded hover:bg-tertiary-fixed transition-colors flex items-center justify-center gap-2 disabled:opacity-50 disabled:cursor-not-allowed" type="button" id="validateBtn">
<span id="btnText">Validate</span>
<span id="loadingSpinner" class="hidden animate-spin">
<svg class="w-5 h-5" xmlns="http://www.w3.org/2000/svg" fill="none" viewBox="0 0 24 24">
<circle class="opacity-25" cx="12" cy="12" r="10" stroke="currentColor" stroke-width="4"></circle>
<path class="opacity-75" fill="currentColor" d="M4 12a8 8 0 018-8V0C5.373 0 0 5.373 0 12h4zm2 5.291A7.962 7.962 0 014 12H0c0 3.042 1.135 5.824 3 7.938l3-2.647z"></path>
</svg>
</span>
</button>
</section>
<!-- Result States (Stacked for demonstration) -->
<section class="flex flex-col gap-md pt-md border-t border-[#27272a]">
<!-- Valid State -->
<div class="flex items-center gap-sm bg-[#0a1f10] border border-[#1e3b26] rounded p-sm hidden" id="validState">
<span class="material-symbols-outlined text-[#4ade80]" data-icon="check_circle" style="font-variation-settings: 'FILL' 1;">check_circle</span>
<span class="font-body-sm text-body-sm text-[#4ade80]" id="validMessage">This card number is valid</span>
</div>
<!-- Invalid State -->
<div class="flex items-center gap-sm bg-[#2b0e0e] border border-[#4a1c1c] rounded p-sm hidden" id="invalidState">
<span class="material-symbols-outlined text-error" data-icon="cancel" style="font-variation-settings: 'FILL' 1;">cancel</span>
<span class="font-body-sm text-body-sm text-error" id="invalidMessage">This card number is not valid</span>
</div>
</section>
</main>

<script>
// Format card number with spaces every 4 digits
document.getElementById('cardNumber').addEventListener('input', (e) => {
  let value = e.target.value.replace(/\s/g, '').replace(/\D/g, '');
  let formattedValue = value.replace(/(\d{4})(?=\d)/g, '$1 ');
  e.target.value = formattedValue;
});

document.getElementById('validateBtn').addEventListener('click', async () => {
  const cardInput = document.getElementById('cardNumber');
  const cardNumber = cardInput.value.trim().replace(/\s/g, '');
  const errorMessage = document.getElementById('errorMessage');
  const validState = document.getElementById('validState');
  const invalidState = document.getElementById('invalidState');
  const validateBtn = document.getElementById('validateBtn');
  const btnText = document.getElementById('btnText');
  const loadingSpinner = document.getElementById('loadingSpinner');

  // Hide all states initially
  errorMessage.classList.add('hidden');
  validState.classList.add('hidden');
  invalidState.classList.add('hidden');

  // Validate input is not empty
  if (!cardNumber) {
    errorMessage.textContent = 'Please enter a card number';
    errorMessage.classList.remove('hidden');
    return;
  }

  // Validate input is numeric
  if (!/^\d+$/.test(cardNumber)) {
    errorMessage.textContent = 'Please enter a valid numeric card number';
    errorMessage.classList.remove('hidden');
    return;
  }

  // Set loading state
  validateBtn.disabled = true;
  btnText.classList.add('hidden');
  loadingSpinner.classList.remove('hidden');

  try {
    // Create AbortController for 30-second timeout
    const controller = new AbortController();
    const timeoutId = setTimeout(() => controller.abort(), 30000);

    // Minimum loading time of 1500ms (1.5 seconds)
    const minLoadingDelay = new Promise(resolve => setTimeout(resolve, 800));
    
    const fetchPromise = fetch('https://card-validation-api-j5eq.onrender.com/api/validate-card', {
      method: 'POST',
      headers: {
        'Content-Type': 'application/json',
      },
      body: JSON.stringify({ cardNumber: cardNumber }),
      signal: controller.signal
    }).then(response => response.json());

    const [data] = await Promise.all([fetchPromise, minLoadingDelay]);
    clearTimeout(timeoutId);

    // Check if valid field exists in response
    if ('valid' in data) {
      const message = data.message || (data.valid ? 'This card number is valid' : 'This card number is not valid');
      
      if (data.valid) {
        document.getElementById('validMessage').textContent = message;
        validState.classList.remove('hidden');
      } else {
        document.getElementById('invalidMessage').textContent = message;
        invalidState.classList.remove('hidden');
      }
    } else if ('error' in data) {
      // Fallback if valid field doesn't exist
      errorMessage.textContent = data.message || 'Error validating card';
      errorMessage.classList.remove('hidden');
    }
  } catch (error) {
    console.error('Error validating card:', error);

    // Distinguish between different error types
    if (error.name === 'AbortError') {
      errorMessage.textContent = 'Request timed out. The server may be waking up — please try again.';
    } else if (error instanceof TypeError || !navigator.onLine) {
      errorMessage.textContent = 'Unable to reach the server. Please check your connection.';
    } else {
      errorMessage.textContent = 'Error connecting to validation service';
    }

    errorMessage.classList.remove('hidden');
  } finally {
    // Clear loading state
    validateBtn.disabled = false;
    btnText.classList.remove('hidden');
    loadingSpinner.classList.add('hidden');
  }
});

// Allow Enter key to trigger validation
document.getElementById('cardNumber').addEventListener('keypress', (e) => {
  if (e.key === 'Enter') {
    document.getElementById('validateBtn').click();
  }
});
</script>
</body></html>
